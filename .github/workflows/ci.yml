name: CI --- Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build, Push and Update Manifests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.DOCKERHUB_USERNAME }}/multi-tier-backend:latest
          ${{ env.DOCKERHUB_USERNAME }}/multi-tier-backend:${{ env.IMAGE_TAG }}

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ env.DOCKERHUB_USERNAME }}/multi-tier-frontend:latest
          ${{ env.DOCKERHUB_USERNAME }}/multi-tier-frontend:${{ env.IMAGE_TAG }}

    - name: Update Kubernetes manifests with new image tags
      run: |
        sed -i "s|multi-tier-backend:.*|multi-tier-backend:$IMAGE_TAG|" k8s/backend-deployment.yml
        sed -i "s|multi-tier-frontend:.*|multi-tier-frontend:$IMAGE_TAG|" k8s/frontend-deployment.yml

    - name: Commit and push updated manifests
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add k8s/backend-deployment.yml k8s/frontend-deployment.yml
        git diff --staged --quiet || git commit -m "ci: update image tags to $IMAGE_TAG"
        git push
